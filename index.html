<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐄 MERCADO GANADERO FEMP - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .femp-card { background: rgba(30, 41, 59, 0.8); border: 1px solid rgba(71, 85, 105, 0.5); backdrop-filter: blur(10px); }
        .femp-card:hover { border-color: #3b82f6; transform: translateY(-2px); transition: all 0.3s; }
        .text-neon { color: #38bdf8; text-shadow: 0 0 10px rgba(56, 189, 248, 0.4); }
    </style>
</head>
<body class="bg-slate-900 text-slate-200 min-h-screen p-4 md:p-8 font-sans">
    <div class="max-w-7xl mx-auto">
        
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 border-b border-slate-700 pb-4 gap-4">
            <div>
                <h1 class="text-3xl font-black text-neon tracking-tight">📊 MERCADO GANADERO FEMP</h1>
                <p class="text-slate-400 text-sm mt-1">Sincronización Automática de Precios</p>
            </div>
            <div class="flex gap-3">
                <div class="bg-slate-800 px-4 py-2 rounded-lg border border-slate-700 text-center">
                    <p class="text-[10px] text-slate-400 uppercase font-bold">Estado del Sistema</p>
                    <p id="femp-status" class="text-yellow-400 font-bold text-sm">● Sincronizando...</p>
                </div>
                <div class="bg-slate-800 px-4 py-2 rounded-lg border border-slate-700 text-center">
                    <p class="text-[10px] text-slate-400 uppercase font-bold">Última Act.</p>
                    <p id="femp-time" class="text-slate-200 font-bold text-sm">--:--</p>
                </div>
            </div>
        </header>

        <div id="dashboard" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 hidden">
            
            <div class="femp-card p-5 rounded-xl">
                <h2 class="text-xl font-bold text-white mb-4 border-l-4 border-blue-500 pl-3">Mercado de Cañuelas</h2>
                <div class="grid grid-cols-2 gap-4" id="grid-canuelas"></div>
            </div>

            <div class="femp-card p-5 rounded-xl">
                <h2 class="text-xl font-bold text-white mb-4 border-l-4 border-green-500 pl-3">Ceres / Tradición</h2>
                <div class="grid grid-cols-2 gap-4" id="grid-ceres"></div>
            </div>

            <div class="femp-card p-5 rounded-xl">
                <h2 class="text-xl font-bold text-white mb-4 border-l-4 border-purple-500 pl-3">Rosgan Central</h2>
                <div class="grid grid-cols-2 gap-4" id="grid-rosgan"></div>
            </div>

            <div class="femp-card p-5 rounded-xl lg:col-span-3">
                <h2 class="text-xl font-bold text-white mb-4 border-l-4 border-yellow-500 pl-3">Macroeconomía & Granos</h2>
                <div class="grid grid-cols-2 md:grid-cols-5 gap-4" id="grid-macro"></div>
            </div>

        </div>

    </div>

    <script>
        // MOTOR FEMP: Extracción segura de datos sin colapsos
        const getVal = (obj, path, fallback = '--') => {
            try {
                const val = path.split('.').reduce((acc, part) => acc && acc[part] !== undefined ? acc[part] : undefined, obj);
                return val !== undefined && val !== null ? val : fallback;
            } catch (e) {
                return fallback;
            }
        };

        // Renderizador de Tarjetas
        const renderItem = (label, value, prefix = '$', isKg = true) => `
            <div class="bg-slate-800/50 p-3 rounded-lg border border-slate-700">
                <p class="text-[10px] text-slate-400 uppercase font-bold mb-1">${label}</p>
                <p class="text-lg font-black text-slate-100">${prefix}${value}${value !== '--' && isKg ? ' <span class="text-xs font-normal text-slate-500">/kg</span>' : ''}</p>
            </div>
        `;

        async function initDashboard() {
            try {
                // Evasión de caché forzada
                const res = await fetch('./data/latest.json?v=' + Date.now());
                if (!res.ok) throw new Error("No se pudo conectar a los datos");
                const data = await res.json();

                // 1. CAÑUELAS (Estructura Anidada: data.canuelas.vacaGorda.precio)
                const c = data.canuelas || {};
                document.getElementById('grid-canuelas').innerHTML = 
                    renderItem('Vaca Gorda', getVal(c, 'vacaGorda.precio')) +
                    renderItem('Novillo Gordo', getVal(c, 'novilloGordo.precio')) +
                    renderItem('Novillito 300+', getVal(c, 'novillito300.precio')) +
                    renderItem('Vaquillona 270+', getVal(c, 'vaquillona270.precio'));

                // 2. CERES (Estructura Directa: data.ceres.ternero)
                const cer = data.ceres || {};
                document.getElementById('grid-ceres').innerHTML = 
                    renderItem('Ternero', getVal(cer, 'ternero')) +
                    renderItem('Novillito', getVal(cer, 'novillito')) +
                    renderItem('Vaq. 160kg', getVal(cer, 'vaquillona160')) +
                    renderItem('Vaca Gorda', getVal(cer, 'vacaGorda'));

                // 3. ROSGAN (Estructura Array: data.rosgan[0].terno)
                const ros = Array.isArray(data.rosgan) && data.rosgan.length > 0 ? data.rosgan[0] : {};
                document.getElementById('grid-rosgan').innerHTML = 
                    renderItem('Ternero', getVal(ros, 'terno')) +
                    renderItem('Novillito', getVal(ros, 'novillito')) +
                    renderItem('Vaq. 160kg', getVal(ros, 'vaquillona160')) +
                    renderItem('Vaca Gorda', getVal(ros, 'vacaGorda'));

                // 4. MACRO Y GRANOS
                const d = data.dolar || {};
                const g = data.granos || {};
                document.getElementById('grid-macro').innerHTML = 
                    renderItem('Dólar Blue', getVal(d, 'blue.venta'), '$', false) +
                    renderItem('Dólar MEP', getVal(d, 'mep.venta'), '$', false) +
                    renderItem('Soja (tn)', getVal(g, 'soja.precio'), '$', false) +
                    renderItem('Maíz (tn)', getVal(g, 'maiz.precio'), '$', false) +
                    renderItem('Trigo (tn)', getVal(g, 'trigo.precio'), '$', false);

                // 5. ACTUALIZACIÓN DE ESTADOS
                document.getElementById('femp-time').textContent = `${data.fecha} ${data.hora}`;
                
                const statusEl = document.getElementById('femp-status');
                if (data._modo === 'SEED') {
                    statusEl.textContent = "● MODO SEED";
                    statusEl.className = "text-orange-400 font-bold text-sm";
                } else {
                    statusEl.textContent = "● ONLINE";
                    statusEl.className = "text-green-400 font-bold text-sm";
                }

                document.getElementById('dashboard').classList.remove('hidden');

            } catch (err) {
                document.getElementById('femp-status').textContent = "● ERROR LECTURA";
                document.getElementById('femp-status').className = "text-red-500 font-bold text-sm";
                console.error("Fallo estructural FEMP:", err);
            }
        }

        initDashboard();
    </script>
</body>
</html>
