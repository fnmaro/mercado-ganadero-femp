<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Ganadero FEMP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card-stat { background: rgba(31, 41, 55, 1); border: 1px solid rgba(75, 85, 99, 1); transition: all 0.3s; }
        .card-stat:hover { border-color: #60a5fa; transform: translateY(-2px); }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans">
    <div class="max-w-5xl mx-auto p-4 md:p-8">
        <header class="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4 border-b border-slate-700 pb-6">
            <div>
                <h1 class="text-3xl font-extrabold text-blue-500 tracking-tight">📊 Dashboard Ganadero FEMP</h1>
                <p class="text-slate-400 mt-1">Automatización de Precios - Mercado de Cañuelas / Ceres</p>
            </div>
            <div class="bg-slate-800 px-4 py-2 rounded-full border border-slate-700">
                <span class="text-sm font-medium">Estado:</span>
                <span class="text-green-400 text-sm font-bold ml-1">● 100% Automático</span>
            </div>
        </header>

        <div id="loading" class="flex flex-col items-center justify-center py-20">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-500 mb-4"></div>
            <p class="text-slate-400">Sincronizando con los datos del bot...</p>
        </div>

        <main id="dashboard" class="hidden">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-8" id="precios-container">
                </div>

            <footer class="text-center text-slate-500 text-sm mt-12 pt-8 border-t border-slate-800">
                <p>Última actualización de datos: <span id="timestamp" class="text-slate-300 font-mono">-</span></p>
                <p class="mt-2">Framework de Exigencia Máxima Práctica (FEMP)</p>
            </footer>
        </main>
    </div>

    <script>
        async function updateDashboard() {
            try {
                // El bot guarda los datos en esta ruta
                const response = await fetch('./data/latest.json');
                if (!response.ok) throw new Error('No se encontraron datos de hoy');
                const data = await response.json();

                const container = document.getElementById('precios-container');
                const timestamp = document.getElementById('timestamp');
                
                container.innerHTML = '';
                timestamp.textContent = data.fecha || new Date().toLocaleDateString();

                // Generar tarjetas para cada categoría
                data.categorias.forEach(cat => {
                    const card = document.createElement('div');
                    card.className = 'card-stat p-5 rounded-xl shadow-lg';
                    card.innerHTML = `
                        <p class="text-slate-400 text-xs font-bold uppercase tracking-wider mb-1">${cat.nombre}</p>
                        <p class="text-3xl font-black text-white">$${cat.precio}</p>
                        <div class="mt-2 text-[10px] text-blue-400 font-semibold italic">Verificado FEMP</div>
                    `;
                    container.appendChild(card);
                });

                document.getElementById('loading').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
            } catch (err) {
                document.getElementById('loading').innerHTML = `
                    <div class="bg-red-900/20 border border-red-900/50 p-6 rounded-lg text-center">
                        <p class="text-red-400 font-bold">⚠️ Esperando primera carga de datos</p>
                        <p class="text-slate-500 text-sm mt-2 italic">El bot aún no ha generado el archivo latest.json</p>
                    </div>
                `;
            }
        }
        updateDashboard();
    </script>
</body>
</html>
