<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Ganadero FEMP</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans">
    <div class="max-w-5xl mx-auto p-4 md:p-8">
        <header class="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4 border-b border-slate-700 pb-6">
            <div>
                <h1 class="text-3xl font-extrabold text-blue-500 tracking-tight">📊 Dashboard Ganadero FEMP</h1>
                <p class="text-slate-400 mt-1 text-sm">Automatización de Precios - Mercado de Cañuelas / Ceres</p>
            </div>
            <div class="bg-slate-800 px-4 py-2 rounded-full border border-slate-700">
                <span id="status-dot" class="text-yellow-400 text-sm font-bold">● Sincronizando...</span>
            </div>
        </header>

        <main id="content">
            <div id="loading" class="text-center py-20">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-500 mx-auto mb-4"></div>
                <p class="text-slate-500 italic">Buscando archivos en /data/latest.json...</p>
            </div>

            <div id="grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 hidden">
                </div>
        </main>

        <footer class="mt-12 pt-8 border-t border-slate-800 text-center text-slate-500 text-xs">
            <p>Última actualización: <span id="fecha" class="font-mono text-slate-300">Cargando...</span></p>
            <p class="mt-2 text-blue-900 font-bold tracking-widest">FRAMEWORK FEMP</p>
        </footer>
    </div>

    <script>
        async function init() {
            const grid = document.getElementById('grid');
            const loading = document.getElementById('loading');
            const statusDot = document.getElementById('status-dot');
            const fechaEl = document.getElementById('fecha');

            try {
                // Intentamos cargar el archivo (agregamos un número aleatorio al final para evitar el cache)
                const res = await fetch(`./data/latest.json?v=${Date.now()}`);
                if (!res.ok) throw new Error("No se pudo leer el archivo de datos");
                
                const data = await res.json();
                
                // El dashboard es inteligente: detecta si es un array o un objeto con .categorias
                const precios = Array.isArray(data) ? data : (data.categorias || []);
                
                if (precios.length === 0) throw new Error("El archivo está vacío");

                grid.innerHTML = precios.map(p => `
                    <div class="bg-slate-800 p-6 rounded-xl border border-slate-700 hover:border-blue-500 transition-all shadow-xl">
                        <p class="text-slate-400 text-[10px] font-bold uppercase mb-1 tracking-widest">${p.nombre || 'Categoría'}</p>
                        <p class="text-3xl font-black text-white">$${p.precio || p.valor || '0.00'}</p>
                        <div class="w-full bg-blue-500/10 h-1 mt-4 rounded-full overflow-hidden">
                            <div class="bg-blue-500 h-full w-2/3"></div>
                        </div>
                    </div>
                `).join('');

                fechaEl.textContent = data.fecha || new Date().toLocaleDateString();
                statusDot.textContent = "● ONLINE";
                statusDot.className = "text-green-400 text-sm font-bold";
                
                loading.classList.add('hidden');
                grid.classList.remove('hidden');

            } catch (err) {
                loading.innerHTML = `
                    <div class="bg-red-900/20 border border-red-500/50 p-8 rounded-2xl max-w-md mx-auto">
                        <p class="text-red-400 font-bold text-lg mb-2">⚠️ Error de Sincronización</p>
                        <p class="text-slate-400 text-sm mb-4">${err.message}</p>
                        <div class="text-[10px] text-slate-600 bg-black/30 p-2 rounded font-mono text-left">
                            CONSEJO FEMP: Verificá que 'data/latest.json' contenga un array de objetos con 'nombre' y 'precio'.
                        </div>
                    </div>
                `;
            }
        }
        init();
    </script>
</body>
</html>
