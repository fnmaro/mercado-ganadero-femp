name: Actualizar Datos Ganaderos FEMP

on:
  workflow_dispatch: # Esto habilita el botón manual
  schedule:
    - cron: '0 12 * * 1-5' # Se ejecuta solo de lunes a viernes

permissions:
  contents: write # IMPORTANTE: Permite que el bot suba los archivos de datos

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias del sistema para Puppeteer
        run: |
          sudo apt-get update
          sudo apt-get install -y libgbm-dev libnss3 libatk-bridge2.0-0 libgtk-3-0

      - name: Instalar dependencias Node
        run: npm install

      - name: Ejecutar scraper FEMP
        run: node scraper.js
        env:
          PUPPETEER_CACHE_DIR: ${{ github.workspace }}/.cache/puppeteer

      - name: Commit y push de datos
        run: |
          git config user.name "FEMP Bot"
          git config user.email "bot@femp.local"
          git add data/
          # Solo hace commit si hay cambios reales en los precios
          git diff --cached --quiet || (git commit -m "[AUTO] Actualización precios $(date +%Y-%m-%d)" && git push)
